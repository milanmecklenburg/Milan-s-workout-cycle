<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout Cycle">
  <title>Workout Cycle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tab Navigation -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="todo">To Do</button>
    <button class="tab" data-tab="exercises">Exercises</button>
    <button class="tab" data-tab="plan">Plan</button>
  </nav>

  <!-- TO DO TAB -->
  <section id="todo" class="page active">
    <h1>Today's Exercises</h1>
    <div class="location-filter">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="home">Home</button>
      <button class="filter-btn" data-filter="gym">Gym</button>
    </div>
    <div id="due-list" class="exercise-list"></div>
    <p id="all-done" class="empty-state" style="display:none;">All done! Nothing due right now.</p>
  </section>

  <!-- EXERCISES TAB -->
  <section id="exercises" class="page">
    <h1>My Exercises</h1>
    <button id="add-exercise-btn" class="btn-primary">+ Add Exercise</button>
    <div id="exercise-list" class="exercise-list"></div>
    <p id="no-exercises" class="empty-state" style="display:none;">No exercises yet. Tap + to add one.</p>
  </section>

  <!-- PLAN TAB -->
  <section id="plan" class="page">
    <h1>Workout Plan</h1>
    <p class="plan-description">Share this with your physiotherapist:</p>
    <div id="plan-text" class="plan-output"></div>
    <button id="copy-plan-btn" class="btn-primary">Copy to Clipboard</button>
    <button id="share-plan-btn" class="btn-primary btn-secondary">Share</button>
  </section>

  <!-- VIDEO MODAL -->
  <div id="video-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <video id="video-player" controls playsinline></video>
    </div>
  </div>

  <!-- ADD/EDIT EXERCISE MODAL -->
  <div id="exercise-modal" class="modal" style="display:none;">
    <div class="modal-content modal-form">
      <h2 id="modal-title">Add Exercise</h2>
      <label>Exercise Name
        <input type="text" id="exercise-name" placeholder="e.g. Hip Bridge">
      </label>
      <label>Video File
        <input type="file" id="exercise-video" accept="video/*">
        <span id="current-video-name" class="current-video"></span>
      </label>
      <label>Location
        <select id="exercise-location">
          <option value="both">Home & Gym</option>
          <option value="home">Home only</option>
          <option value="gym">Gym only</option>
        </select>
      </label>
      <label class="toggle-label">
        <span>Paused (out of rotation)</span>
        <input type="checkbox" id="exercise-paused">
        <span class="toggle-switch"></span>
      </label>
      <label>Rest Days Between Sessions
        <input type="number" id="exercise-rest" min="0" max="14" value="2" placeholder="e.g. 2">
        <span class="hint">After completing, wait this many days before it's due again.</span>
      </label>
      <div class="modal-actions">
        <button id="save-exercise-btn" class="btn-primary">Save</button>
        <button id="cancel-exercise-btn" class="btn-cancel">Cancel</button>
        <button id="delete-exercise-btn" class="btn-delete" style="display:none;">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
